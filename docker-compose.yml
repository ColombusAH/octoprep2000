services:
  db:
    image: postgres:15-alpine
    container_name: octoprep-db
    environment:
      POSTGRES_USER: octoprep
      POSTGRES_PASSWORD: octoprep
      POSTGRES_DB: octoprep
    ports:
      - "5432:5432"
    volumes:
      - octoprep_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octoprep"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: octoprep-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@octoprep.com
      PGADMIN_DEFAULT_PASSWORD: octoprep
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - octoprep_pgadmin:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  octoprep_pgdata:
  octoprep_pgadmin:
